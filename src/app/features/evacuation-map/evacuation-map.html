<div class="map-wrapper">
  <svg viewBox="0 0 1000 700" class="map">
    <!-- Стены здания -->
    <rect x="20" y="20" width="960" height="660" fill="var(--surface)" stroke="var(--outline)" stroke-width="4" rx="12"/>

    <!-- Помещения -->
    <!-- Левое крыло: Цех -->
    <rect x="40" y="40" width="280" height="300" fill="var(--bubble-bot)" stroke="var(--outline)" rx="8"/>
    <text x="180" y="220" text-anchor="middle" font-size="20" fill="var(--on-surface)">Цех</text>

    <!-- Центральное: Лаборатория -->
    <rect x="360" y="40" width="280" height="300" fill="var(--bubble-bot)" stroke="var(--outline)" rx="8"/>
    <text x="500" y="220" text-anchor="middle" font-size="20" fill="var(--on-surface)">Лаборатория</text>

    <!-- Правое крыло: Склад -->
    <rect x="680" y="40" width="280" height="300" fill="var(--bubble-bot)" stroke="var(--outline)" rx="8"/>
    <text x="820" y="220" text-anchor="middle" font-size="20" fill="var(--on-surface)">Склад</text>

    <!-- Нижний ряд: Офис, Комната отдыха, Столовая -->
    <rect x="40" y="380" width="200" height="200" fill="var(--bubble-bot)" stroke="var(--outline)" rx="8"/>
    <text x="140" y="490" text-anchor="middle" font-size="18" fill="var(--on-surface)">Офис</text>

    <rect x="280" y="380" width="200" height="200" fill="var(--bubble-bot)" stroke="var(--outline)" rx="8"/>
    <text x="380" y="480" text-anchor="middle" font-size="18" fill="var(--on-surface)">Комната</text>
    <text x="380" y="505" text-anchor="middle" font-size="18" fill="var(--on-surface)">отдыха</text>

    <rect x="520" y="380" width="200" height="200" fill="var(--bubble-bot)" stroke="var(--outline)" rx="8"/>
    <text x="620" y="490" text-anchor="middle" font-size="18" fill="var(--on-surface)">Столовая</text>

    <!-- Коридоры -->
    <line x1="340" y1="40" x2="340" y2="580" stroke="var(--outline)" stroke-width="2" stroke-dasharray="8,4"/>
    <line x1="660" y1="40" x2="660" y2="580" stroke="var(--outline)" stroke-width="2" stroke-dasharray="8,4"/>
    <line x1="40" y1="370" x2="920" y2="370" stroke="var(--outline)" stroke-width="2" stroke-dasharray="8,4"/>

    <!-- Выходы -->
    <!-- Главный выход (юг) -->
    <g class="exit-group" [class.active]="safeExit()==='main'" (click)="selectExit('main')">
      <rect x="440" y="620" width="120" height="40" fill="#4CAF50" rx="6"/>
      <text x="500" y="645" text-anchor="middle" fill="white" font-weight="bold">Главный выход</text>
    </g>

    <!-- Запасной выход (восток) -->
    <g class="exit-group" [class.active]="safeExit()==='east'" (click)="selectExit('east')">
      <rect x="920" y="300" width="40" height="100" fill="#4CAF50" rx="6"/>
      <text x="945" y="345" text-anchor="middle" fill="white" font-weight="bold" transform="rotate(90, 945, 345)">Запасной</text>
    </g>

    <!-- Пожарная лестница (запад) -->
    <g class="exit-group" [class.active]="safeExit()==='west'" (click)="selectExit('west')">
      <rect x="20" y="300" width="40" height="100" fill="#FF9800" rx="6"/>
      <text x="35" y="345" text-anchor="middle" fill="white" font-weight="bold" transform="rotate(-90, 35, 345)">Пожарный</text>
    </g>

    <!-- Текущее положение пользователя -->
    <circle cx="500" cy="500" r="10" fill="#1976D2" stroke="white" stroke-width="2"/>
    <text x="500" y="530" text-anchor="middle" font-size="14" fill="var(--on-surface)">Вы здесь</text>

    <!-- Путь к выбранному выходу -->
    @if (safeExit()) {
      <line [attr.x1]="500" [attr.y1]="500"
            [attr.x2]="exitCoords[safeExit()!]?.x" [attr.y2]="exitCoords[safeExit()!]?.y"
            stroke="red" stroke-width="3" stroke-dasharray="8,4"/>
    }

    <!-- Легенда -->
    <g transform="translate(780, 570)">
      <rect x="0" y="0" width="200" height="90" fill="var(--surface)" stroke="var(--outline)" rx="4"/>
      <text x="100" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--on-surface)">Обозначения</text>
      <line x1="10" y1="35" x2="30" y2="35" stroke="red" stroke-width="2" stroke-dasharray="4,2"/>
      <text x="35" y="39" font-size="11" fill="var(--on-surface)">Путь эвакуации</text>
      <circle cx="17" cy="55" r="6" fill="#1976D2" stroke="white" stroke-width="1"/>
      <text x="35" y="59" font-size="11" fill="var(--on-surface)">Ваше положение</text>
      <rect x="12" y="66" width="12" height="12" fill="#4CAF50"/>
      <text x="35" y="77" font-size="11" fill="var(--on-surface)">Выход</text>
    </g>
  </svg>
</div>
